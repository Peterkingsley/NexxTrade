<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.nexxtrade.io/images/Nexxtradeai.svg" type="image/svg+xml">
    <title>NexxTrade Admin Panel - Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        /* Custom CSS to match the original site's theme and styles */
        :root {
            --bg: #0b0f14;
            --bg-2: #0f141b;
            --text: #e9edf3;
            --muted: #a8b3c7;
            --accent: #2ad678;
            --accent-2: #f0c75e;
            --danger: #ff5d5d;
            --line: #1b2330;
            --shadow: 0 8px 24px rgba(0,0,0,.35);
            --radius: 16px;
            --radius-lg: 20px;
        }
        
        /* Apply a consistent font and background */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Reusable card style */
        .card {
            background: var(--bg-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        /* Input field styling */
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: #0d1219;
            border: 1px solid var(--line);
            color: var(--text);
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Button styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            padding: .9rem 1.4rem;
            border-radius: 999px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: .2s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent);
            color: #04140a;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            border-color: var(--line);
            color: var(--text);
        }

        .btn-ghost:hover {
            background: #0f151d;
        }

        /* Utility for spacing and layout */
        .container {
            width: 100%;
            max-width: 1200px;
            margin-inline: auto;
            padding-inline: 20px;
        }
        
        /* Custom styles for admin panel tabs */
        .tab-btn {
            padding: 12px 20px;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Table styling for a more admin-like feel */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
        }

        th {
            color: var(--muted);
            font-weight: 600;
            background: #0d1219;
        }

        /* Message box styling */
        .message-box {
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .message-box.success {
            background-color: rgba(42, 214, 120, 0.1);
            color: var(--accent);
            border: 1px solid rgba(42, 214, 120, 0.2);
        }

        .message-box.error {
            background-color: rgba(255, 93, 93, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 93, 93, 0.2);
        }

        /* Styles for the brand logo */
        .brand {
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .logo {
            width: 44px;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* Responsive-specific styles for mobile */
        @media (max-width: 768px) {
            .container {
                padding-inline: 16px;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .tab-nav {
                flex-wrap: wrap;
                justify-content: center;
                border-bottom: none;
                gap: 8px;
            }

            .tab-nav .tab-btn {
                flex: 1 1 auto;
                border-bottom: 2px solid transparent;
                border-radius: 999px;
                padding: 8px 16px;
                text-align: center;
            }

            .tab-nav .tab-btn.active {
                background-color: var(--line);
            }

            table {
                display: block;
                width: 100%;
                white-space: nowrap;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="admin-panel" class="container space-y-8">
        <!-- Header Section -->
        <div class="card p-4 md:p-6 flex justify-between items-center admin-header">
            <div class="flex items-center gap-4">
                <a class="brand" href="/" aria-label="NexxTrade home">
                    <img src="/images/Nexxtrade (1).svg" alt="NexxTrade Logo" class="logo">
                    <h1 class="text-xl md:text-2xl font-bold">NexxTrade Admin Panel</h1>
                </a>
            </div>
            <a href="/admin" id="logout-btn" class="btn btn-ghost">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                Log Out
            </a>
        </div>

        <!-- Tab Navigation -->
                <div class="flex flex-wrap border-b border-line gap-2 tab-nav">
            <a href="/admin/dashboard" class="tab-btn">Dashboard</a>
            <a href="/admin/blogs" class="tab-btn">Manage Blogs</a>
            <a href="/admin/performance" class="tab-btn">Performance</a>
            <a href="/admin/pricing" class="tab-btn active">Update Pricing</a>
            <a href="/admin/roles" class="tab-btn">Delegate Roles</a>
            <a href="/admin/notifications" class="tab-btn">Manage Notifications</a>
            <a href="/admin/payouts" class="tab-btn">Manage Payouts</a>
            <a href="/admin/affiliates" class="tab-btn">Manage Affiliates</a>
        </div>

        <div class="space-y-8">
            <h2 class="text-2xl font-semibold">Pricing Plan Management</h2>

            <div id="pricingMessageBox" class="hidden message-box"></div>

            <!-- Form to Add/Edit Plan -->
            <div class="card p-6 space-y-4">
                <h3 class="text-xl font-semibold flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-accent"></i>
                    Add/Edit Pricing Plan
                </h3>
                <form id="addPricingForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="hidden" id="plan-id">
                    <div>
                        <label for="plan-name" class="block text-sm font-medium mb-1 text-muted">Plan Name</label>
                        <input type="text" id="plan-name" placeholder="e.g., Monthly Pro" class="input-field" required>
                    </div>
                    <div>
                        <label for="plan-price" class="block text-sm font-medium mb-1 text-muted">Price ($)</label>
                        <input type="number" id="plan-price" step="0.01" placeholder="99.99" class="input-field" required>
                    </div>
                    <div>
                        <label for="plan-term" class="block text-sm font-medium mb-1 text-muted">Term (e.g., 1 Month)</label>
                        <input type="text" id="plan-term" placeholder="Monthly" class="input-field" required>
                    </div>
                    <div>
                        <label for="plan-commission-rate" class="block text-sm font-medium mb-1 text-muted">Commission Rate (0.00 to 1.00)</label>
                        <input type="number" id="plan-commission-rate" step="0.01" placeholder="0.10" class="input-field">
                    </div>
                    <div>
                        <label for="plan-telegram-group-id" class="block text-sm font-medium mb-1 text-muted">Telegram Group ID</label>
                        <input type="text" id="plan-telegram-group-id" placeholder="-100..." class="input-field">
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="plan-best-value" class="w-5 h-5 rounded border-line bg-bg-2 text-accent focus:ring-accent">
                        <label for="plan-best-value" class="text-sm font-medium text-muted">Mark as Best Value</label>
                    </div>
                    <div class="md:col-span-2">
                        <label for="plan-description" class="block text-sm font-medium mb-1 text-muted">Description</label>
                        <textarea id="plan-description" rows="2" placeholder="Brief summary of the plan" class="input-field"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label for="plan-features" class="block text-sm font-medium mb-1 text-muted">Features (One per line)</label>
                        <textarea id="plan-features" rows="4" placeholder="Feature 1\nFeature 2..." class="input-field"></textarea>
                    </div>
                    <div class="md:col-span-2 flex gap-4">
                        <button type="submit" id="savePricingBtn" class="btn btn-primary flex-1">
                            <i data-lucide="save" class="w-5 h-5"></i>
                            Save Plan
                        </button>
                        <button type="button" id="cancelEditBtn" class="btn btn-ghost hidden">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Pricing Plans Table -->
            <div class="space-y-4">
                <h3 class="text-xl font-semibold flex items-center gap-2">
                    <i data-lucide="list" class="text-accent"></i>
                    Existing Plans
                </h3>
                <div class="card overflow-hidden">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Term</th>
                                <th>Commission</th>
                                <th>Best Value</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pricingTableBody">
                            <!-- Rows will be injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const API_BASE_URL = '';
            const addPricingForm = document.getElementById('addPricingForm');
            const planIdInput = document.getElementById('plan-id');
            const savePricingBtn = document.getElementById('savePricingBtn');
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            const pricingTableBody = document.getElementById('pricingTableBody');
            const pricingMessageBox = document.getElementById('pricingMessageBox');

            if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
                window.location.href = '/admin';
            }

            const showMessage = (message, type = 'success') => {
                pricingMessageBox.textContent = message;
                pricingMessageBox.className = `message-box block ${type === 'success' ? 'success' : 'error'}`;
                pricingMessageBox.classList.remove('hidden');
                setTimeout(() => pricingMessageBox.classList.add('hidden'), 5000);
            };

            const fetchPricingPlans = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/pricing`);
                    const plans = await response.json();
                    pricingTableBody.innerHTML = '';
                    plans.forEach(plan => {
                        const commissionRate = plan.commission_rate ? (parseFloat(plan.commission_rate) * 100).toFixed(0) + '%' : 'N/A';
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${plan.plan_name}</td>
                            <td>$${parseFloat(plan.price).toFixed(2)}</td>
                            <td>${plan.term}</td>
                            <td>${commissionRate}</td>
                            <td>${plan.is_best_value ? '<span class="text-accent">Yes</span>' : '<span class="text-muted">No</span>'}</td>
                            <td>
                                <div class="flex gap-2">
                                    <button onclick="editPlan(${plan.id})" class="btn btn-ghost py-1 px-3 text-sm">Edit</button>
                                    <button onclick="deletePlan(${plan.id})" class="btn btn-ghost py-1 px-3 text-sm text-danger hover:bg-danger/10">Delete</button>
                                </div>
                            </td>
                        `;
                        pricingTableBody.appendChild(row);
                    });
                } catch (error) {
                    console.error('Error fetching pricing plans:', error);
                    showMessage('Failed to load pricing plans.', 'error');
                }
            };

            const editPlan = async (id) => {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/pricing/${id}`);
                    const plan = await response.json();
                    planIdInput.value = plan.id;
                    document.getElementById('plan-name').value = plan.plan_name;
                    document.getElementById('plan-price').value = plan.price;
                    document.getElementById('plan-term').value = plan.term;
                    document.getElementById('plan-description').value = plan.description;
                    document.getElementById('plan-features').value = Array.isArray(plan.features) ? plan.features.join('\n') : '';
                    document.getElementById('plan-best-value').checked = plan.is_best_value;
                    document.getElementById('plan-telegram-group-id').value = plan.telegram_group_id;
                    document.getElementById('plan-commission-rate').value = plan.commission_rate;

                    savePricingBtn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i> Update Plan';
                    lucide.createIcons();
                    cancelEditBtn.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (error) {
                    console.error('Error fetching plan details:', error);
                    showMessage('Could not fetch plan details.', 'error');
                }
            };

            const addUpdatePlan = async (event) => {
                event.preventDefault();
                const id = planIdInput.value;
                const planData = {
                    plan_name: document.getElementById('plan-name').value,
                    price: parseFloat(document.getElementById('plan-price').value),
                    term: document.getElementById('plan-term').value,
                    description: document.getElementById('plan-description').value,
                    features: document.getElementById('plan-features').value.split('\n').filter(f => f.trim() !== ''),
                    is_best_value: document.getElementById('plan-best-value').checked,
                    telegram_group_id: document.getElementById('plan-telegram-group-id').value,
                    commission_rate: parseFloat(document.getElementById('plan-commission-rate').value)
                };

                const url = id ? `${API_BASE_URL}/api/pricing/${id}` : `${API_BASE_URL}/api/pricing`;
                const method = id ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(planData)
                    });

                    if (response.ok) {
                        showMessage(`Pricing plan ${id ? 'updated' : 'added'} successfully!`, 'success');
                        addPricingForm.reset();
                        planIdInput.value = '';
                        savePricingBtn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i> Save Plan';
                        lucide.createIcons();
                        cancelEditBtn.classList.add('hidden');
                        fetchPricingPlans();
                    } else {
                        const error = await response.json();
                        throw new Error(error.message || 'Failed to save plan.');
                    }
                } catch (error) {
                    console.error('Error saving pricing plan:', error);
                    showMessage(`Error: ${error.message}`, 'error');
                }
            };

            const deletePlan = async (id) => {
                if (!confirm('Are you sure you want to delete this pricing plan?')) return;
                try {
                    const response = await fetch(`${API_BASE_URL}/api/pricing/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        showMessage('Pricing plan deleted successfully!', 'success');
                        fetchPricingPlans();
                    } else {
                        throw new Error('Failed to delete pricing plan.');
                    }
                } catch (error) {
                    console.error('Error deleting pricing plan:', error);
                    showMessage('Error deleting pricing plan.', 'error');
                }
            };

            window.editPlan = editPlan;
            window.deletePlan = deletePlan;

            addPricingForm.addEventListener('submit', addUpdatePlan);
            cancelEditBtn.addEventListener('click', () => {
                addPricingForm.reset();
                planIdInput.value = '';
                savePricingBtn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i> Save Plan';
                lucide.createIcons();
                cancelEditBtn.classList.add('hidden');
            });

            document.getElementById('logout-btn').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.removeItem('isAdminLoggedIn');
                window.location.href = '/admin';
            });

            fetchPricingPlans();
        });
    </script>
</body>
</html>
