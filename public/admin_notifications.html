<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.nexxtrade.io/images/Nexxtradeai.svg" type="image/svg+xml">
    <title>NexxTrade Admin Panel - Send Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        /* Custom CSS to match the original site's theme and styles */
        :root {
            --bg: #0b0f14;
            --bg-2: #0f141b;
            --text: #e9edf3;
            --muted: #a8b3c7;
            --accent: #2ad678;
            --accent-2: #f0c75e;
            --danger: #ff5d5d;
            --line: #1b2330;
            --shadow: 0 8px 24px rgba(0,0,0,.35);
            --radius: 16px;
            --radius-lg: 20px;
        }

        /* Apply a consistent font and background */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Reusable card style */
        .card {
            background: var(--bg-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        /* Input field styling */
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: #0d1219;
            border: 1px solid var(--line);
            color: var(--text);
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Button styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            padding: .9rem 1.4rem;
            border-radius: 999px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: .2s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent);
            color: #04140a;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            border-color: var(--line);
            color: var(--text);
        }

        .btn-ghost:hover {
            background: #0f151d;
        }

        /* Utility for spacing and layout */
        .container {
            width: 100%;
            max-width: 1200px;
            margin-inline: auto;
            padding-inline: 20px;
        }

        /* Custom styles for admin panel tabs */
        .tab-btn {
            padding: 12px 20px;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* Message box styling */
        .message-box {
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .message-box.success {
            background-color: rgba(42, 214, 120, 0.1);
            color: var(--accent);
            border: 1px solid rgba(42, 214, 120, 0.2);
        }

        .message-box.error {
            background-color: rgba(255, 93, 93, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 93, 93, 0.2);
        }

        /* User tags */
        .user-tag {
            display: inline-flex;
            align-items: center;
            background: rgba(42, 214, 120, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.875rem;
            border: 1px solid rgba(42, 214, 120, 0.2);
        }
        .user-tag-remove {
            margin-left: 0.5rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* Image preview */
        .image-preview-item {
            position: relative;
        }
        .image-preview-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* Styles for the brand logo */
        .brand {
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .logo {
            width: 44px;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* Responsive-specific styles for mobile */
        @media (max-width: 768px) {
            .container {
                padding-inline: 16px;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .tab-nav {
                flex-wrap: wrap;
                justify-content: center;
                border-bottom: none;
                gap: 8px;
            }

            .tab-nav .tab-btn {
                flex: 1 1 auto;
                border-bottom: 2px solid transparent;
                border-radius: 999px;
                padding: 8px 16px;
                text-align: center;
            }

            .tab-nav .tab-btn.active {
                background-color: var(--line);
            }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="admin-panel" class="container space-y-8">
        <!-- Header Section -->
        <div class="card p-4 md:p-6 flex justify-between items-center admin-header">
            <div class="flex items-center gap-4">
                <a class="brand" href="/" aria-label="NexxTrade home">
                    <img src="/images/Nexxtrade (1).svg" alt="NexxTrade Logo" class="logo">
                    <h1 class="text-xl md:text-2xl font-bold">NexxTrade Admin Panel</h1>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-muted hidden md:inline" id="usernameDisplay"></span>
                <a href="/admin" id="logout-btn" class="btn btn-ghost">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    Log Out
                </a>
            </div>
        </div>

        <!-- Tab Navigation -->
                <div class="flex flex-wrap border-b border-line gap-2 tab-nav">
            <a href="/admin/dashboard" class="tab-btn">Dashboard</a>
            <a href="/admin/blogs" class="tab-btn">Manage Blogs</a>
            <a href="/admin/performance" class="tab-btn">Performance</a>
            <a href="/admin/pricing" class="tab-btn">Update Pricing</a>
            <a href="/admin/roles" class="tab-btn">Delegate Roles</a>
            <a href="/admin/notifications" class="tab-btn active">Manage Notifications</a>
            <a href="/admin/payouts" class="tab-btn">Manage Payouts</a>
            <a href="/admin/affiliates" class="tab-btn">Manage Affiliates</a>
        </div>

        <div class="space-y-8">
            <h2 class="text-2xl font-semibold">Push Notifications</h2>

            <div class="card p-6">
                <form id="notificationForm" class="space-y-6">
                    <div>
                        <label for="targetAudience" class="block text-sm font-medium mb-1 text-muted">Target Audience</label>
                        <select id="targetAudience" class="input-field">
                            <option value="all">All Registered Users</option>
                            <option value="active">Active Subscribers Only</option>
                            <option value="specific">Specific Users (by Telegram Handle)</option>
                        </select>
                    </div>

                    <div id="specificUserContainer" class="hidden space-y-2">
                        <label class="block text-sm font-medium text-muted">Telegram Handles</label>
                        <div id="telegramHandlesContainer" class="input-field flex flex-wrap gap-2 items-center">
                            <input type="text" id="telegramHandleInput" placeholder="Type and press Enter..." class="bg-transparent border-none outline-none flex-1 min-w-[150px] text-text">
                        </div>
                        <p class="text-xs text-muted italic">Type a handle (without @) and press Enter to add.</p>
                    </div>

                    <div>
                        <label for="message" class="block text-sm font-medium mb-1 text-muted">Message Content</label>
                        <textarea id="message" rows="5" class="input-field" placeholder="Enter your notification message here..." required></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-muted">Embed Quick Actions (Optional)</label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" name="embedCommand" value="/start" class="w-4 h-4 rounded border-line bg-bg-2 text-accent focus:ring-accent">
                                <span class="text-sm">/start (Main Menu)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" name="embedCommand" value="/pricing" class="w-4 h-4 rounded border-line bg-bg-2 text-accent focus:ring-accent">
                                <span class="text-sm">/pricing (View Plans)</span>
                            </label>
                             <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" name="embedCommand" value="/performance" class="w-4 h-4 rounded border-line bg-bg-2 text-accent focus:ring-accent">
                                <span class="text-sm">/performance (View Results)</span>
                            </label>
                             <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" name="embedCommand" value="/support" class="w-4 h-4 rounded border-line bg-bg-2 text-accent focus:ring-accent">
                                <span class="text-sm">/support (Contact Us)</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-muted">Attach Images (Max 10)</label>
                        <div class="flex flex-col gap-4">
                            <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">
                            <button type="button" onclick="document.getElementById('imageUpload').click()" class="btn btn-ghost w-full py-4 border-dashed border-2">
                                <i data-lucide="image" class="mr-2"></i> Select Images
                            </button>
                            <div id="imagePreviewContainer" class="flex flex-wrap gap-4"></div>
                        </div>
                    </div>

                    <button type="submit" id="sendButton" class="btn btn-primary w-full py-4 text-lg">
                        <i data-lucide="send" class="mr-2"></i> Send Notification
                    </button>

                    <div id="statusMessage" class="hidden"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            checkAuth();
            setupUI();
            setupMultiUserInput();
            setupImageUpload();
            setupFormSubmission();
        });

        function checkAuth() {
            if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
                window.location.href = '/admin';
            } else {
                const user = JSON.parse(sessionStorage.getItem('user'));
                if (user && user.username) {
                    document.getElementById('usernameDisplay').textContent = user.username;
                }
            }
        }

        function setupUI() {
            document.getElementById('logout-btn').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.removeItem('isAdminLoggedIn');
                sessionStorage.removeItem('user');
                window.location.href = '/admin'; 
            });

            const targetAudience = document.getElementById('targetAudience');
            const specificUserContainer = document.getElementById('specificUserContainer');
            targetAudience.addEventListener('change', function() {
                if (this.value === 'specific') {
                    specificUserContainer.classList.remove('hidden');
                } else {
                    specificUserContainer.classList.add('hidden');
                }
            });
        }

        function setupImageUpload() {
            const fileInput = document.getElementById('imageUpload');
            const previewContainer = document.getElementById('imagePreviewContainer');

            fileInput.addEventListener('change', event => {
                const files = event.target.files;
                for (const file of files) {
                    if (!file.type.startsWith('image/')) continue;
                    const reader = new FileReader();
                    reader.onload = e => {
                        const previewWrapper = document.createElement('div');
                        previewWrapper.className = 'image-preview-item';
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'w-24 h-24 object-cover rounded-lg shadow-md border border-line';
                        img.dataset.base64 = e.target.result;
                        const removeBtn = document.createElement('div');
                        removeBtn.className = 'image-preview-remove';
                        removeBtn.innerHTML = '&times;';
                        removeBtn.onclick = () => previewWrapper.remove();
                        previewWrapper.appendChild(img);
                        previewWrapper.appendChild(removeBtn);
                        previewContainer.appendChild(previewWrapper);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        
        function addTag(username) {
            const container = document.getElementById('telegramHandlesContainer');
            const input = document.getElementById('telegramHandleInput');
            if (!username) return;
            const existingTags = Array.from(container.querySelectorAll('.user-tag-text')).map(t => t.textContent);
            if (existingTags.includes(username)) {
                input.value = '';
                return;
            }
            const tag = document.createElement('span');
            tag.className = 'user-tag';
            const tagText = document.createElement('span');
            tagText.className = 'user-tag-text';
            tagText.textContent = username;
            const removeBtn = document.createElement('span');
            removeBtn.className = 'user-tag-remove';
            removeBtn.innerHTML = '&times;';
            removeBtn.onclick = () => tag.remove();
            tag.appendChild(tagText);
            tag.appendChild(removeBtn);
            container.insertBefore(tag, input);
        }

        function setupMultiUserInput() {
            const input = document.getElementById('telegramHandleInput');
            input.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' && input.value.trim() !== '') {
                    event.preventDefault();
                    addTag(input.value.trim());
                    input.value = '';
                }
            });
        }
        
        function setupFormSubmission() {
            const form = document.getElementById('notificationForm');
            const sendButton = document.getElementById('sendButton');
            const statusMessage = document.getElementById('statusMessage');

            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                const target = document.getElementById('targetAudience').value;
                const telegramHandleInput = document.getElementById('telegramHandleInput');
                if (target === 'specific' && telegramHandleInput.value.trim() !== '') {
                    addTag(telegramHandleInput.value.trim());
                    telegramHandleInput.value = '';
                }
                const message = document.getElementById('message').value;
                const telegramHandles = Array.from(document.querySelectorAll('.user-tag-text')).map(tag => tag.textContent);
                const commands = Array.from(document.querySelectorAll('input[name="embedCommand"]:checked')).map(cb => cb.value);
                const images = Array.from(document.querySelectorAll('#imagePreviewContainer img')).map(img => img.dataset.base64);

                if (target === 'specific' && telegramHandles.length === 0) {
                    displayStatus('Please enter at least one Telegram handle.', 'error');
                    return;
                }
                
                const payload = { message, target, commands, images };
                if (target === 'specific') payload.telegramHandles = telegramHandles;

                sendButton.disabled = true;
                sendButton.innerHTML = `<i data-lucide="loader-2" class="animate-spin mr-2"></i> Sending...`;
                lucide.createIcons();
                displayStatus('Processing your request...', 'info');

                try {
                    const response = await fetch('/api/notifications/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (response.ok) {
                        displayStatus(result.message, 'success');
                        form.reset(); 
                        document.getElementById('specificUserContainer').classList.add('hidden');
                        document.querySelectorAll('.user-tag').forEach(tag => tag.remove());
                        document.getElementById('imagePreviewContainer').innerHTML = '';
                        document.getElementById('imageUpload').value = '';
                    } else {
                        throw new Error(result.message || 'An unknown error occurred.');
                    }
                } catch (error) {
                    console.error('Error sending notification:', error);
                    displayStatus(`Error: ${error.message}`, 'error');
                } finally {
                    sendButton.disabled = false;
                    sendButton.innerHTML = `<i data-lucide="send" class="mr-2"></i> Send Notification`;
                    lucide.createIcons();
                }
            });

            function displayStatus(message, type) {
                statusMessage.innerHTML = message;
                statusMessage.className = 'message-box block ';
                statusMessage.classList.remove('hidden');
                switch(type) {
                    case 'success': statusMessage.classList.add('success'); break;
                    case 'error': statusMessage.classList.add('error'); break;
                    case 'info': statusMessage.classList.add('success'); break; // reused success style for info
                }
            }
        }
    </script>
</body>
</html>
